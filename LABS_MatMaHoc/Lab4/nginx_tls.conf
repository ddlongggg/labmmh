# Task 2: TLS Deployment Task
# Requirements: TLS 1.2 or 1.3, trusted root, ECDSA cert.

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;

    # ECDSA Certificate Configuration
    # These paths point to the ECDSA cert signed by a trusted root (e.g. ZeroSSL/Let's Encrypt)
    ssl_certificate /etc/nginx/ssl/example.com.ecdsa.crt;
    ssl_certificate_key /etc/nginx/ssl/example.com.ecdsa.key;

    # SSL Protocol Configuration
    # Restrict to TLS 1.2 and TLS 1.3 only. 
    # MD5 and SHA-1 are implicitly banned by modern TLS configurations and cipher suites.
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # Cipher suites (Prioritize ECDHE/ECDSA, block weak ciphers)
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security Headers (HSTS)
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Basic serving configuration
    root /var/www/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;
    return 301 https://$host$request_uri;
}
